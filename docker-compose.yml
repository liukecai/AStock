services:
  postgres:
    image: postgres:16-alpine
    container_name: aquant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aquant
      POSTGRES_USER: aquant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - aquant_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquant"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: aquant-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aquant:${POSTGRES_PASSWORD:-changeme}@postgres:5432/aquant
      DATABASE_PATH: /app/data/aquant.db
      DATA_DIR: /app/data
      MARKET_PROVIDER: akshare
      AKSHARE_SOURCE: sina
      AKSHARE_UNIVERSE_SIZE: "0"
      AKSHARE_DELAY: "0.35"
      DEMO_DATA: "false"
      NEWS_HISTORY_DAYS: "7"
      RSSHUB_BASE_URL: http://rsshub:1200
    volumes:
      - aquant_data:/app/data
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rsshub:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
      interval: 30s
      timeout: 5s
      retries: 3

  rsshub:
    image: diygod/rsshub:latest
    container_name: aquant-rsshub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
      CACHE_EXPIRE: "300"
    expose:
      - "1200"

  web:
    container_name: aquant-web
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - default
      - caddy_proxy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aquant_data:
  aquant_pg_data:

networks:
  caddy_proxy:
    external: true
    name: headscale_default
